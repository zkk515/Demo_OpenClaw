<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - MK 博客</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            color: #333;
        }
        .login-container {
            max-width: 380px;
            margin: 120px auto;
            padding: 40px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid #e1e4e8;
            text-align: center;
        }
        .logo { font-size: 40px; margin-bottom: 16px; color: #0070f3; }
        h1 { font-size: 20px; font-weight: 500; color: #2c3e50; margin-bottom: 32px; }
        input {
            width: 100%;
            padding: 10px 14px;
            margin-bottom: 14px;
            border: 1px solid #dde1e6;
            border-radius: 4px;
            background: #fff;
            color: #333;
            font-size: 14px;
        }
        input::placeholder { color: #8899a6; }
        input:focus { outline: none; border-color: #0070f3; }
        .btn {
            width: 100%;
            padding: 10px;
            background: #0070f3;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #0051d5; }
        .error { color: #e74c3c; margin-top: 12px; font-size: 13px; }
        .back { margin-top: 24px; }
        .back a { color: #8899a6; text-decoration: none; font-size: 13px; }
        .back a:hover { color: #0070f3; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">💎</div>
        <h1>管理后台</h1>
        <form id="loginForm">
            <input type="text" id="username" placeholder="用户名" required>
            <input type="password" id="password" placeholder="密码" required>
            <button type="submit" class="btn">登录</button>
        </form>
        <p class="error" id="errorMsg"></p>
        <div class="back">
            <a href="../index.html">← 返回博客</a>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            if(user === 'admin' && pass === 'admin123') {
                localStorage.setItem('blog_admin', 'true');
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('errorMsg').textContent = '用户名或密码错误';
            }
        });
    </script>
</body>
</html>
